<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joanna Veloria — Coming soon</title>
  <meta name="description" content="A new portfolio by Joanna Veloria — currently in the works." />
  <meta name="robots" content="noindex" />
  <script
    src="https://js.sentry-cdn.com/cadbfbca631c31900d07a1693034ee8b.min.js"
    crossorigin="anonymous"
    async
  ></script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HEGSY3D6SF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HEGSY3D6SF');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @font-face { font-family: 'Saans'; src: url('fonts/Saans-TRIAL-Regular.otf') format('opentype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Saans'; src: url('fonts/Saans-TRIAL-Medium.otf') format('opentype'); font-weight: 500; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Saans'; src: url('fonts/Saans-TRIAL-Heavy.otf') format('opentype'); font-weight: 800; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Saans'; src: url('fonts/Saans-TRIAL-Heavy.otf') format('opentype'); font-weight: 900; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Saans Mono'; src: url('fonts/SaansMono-TRIAL-Regular.otf') format('opentype'); font-weight: 400; font-style: normal; font-display: swap; }

    :root {
      --stone-50:  #fafaf9;
      --stone-200: #e7e5e4;
      --stone-500: #78716c;
      --stone-700: #44403c;
      --stone-900: #1c1917;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Saans', ui-sans-serif, system-ui, sans-serif;
      background: var(--stone-50);
      color: var(--stone-900);
      overflow-x: hidden;
    }
    .mono { font-family: 'Saans Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
    .display { font-weight: 800; letter-spacing: -0.045em; line-height: 0.9; }
    ::selection { background: var(--stone-900); color: var(--stone-50); }

    @keyframes blink { 0%, 60% { opacity: 1; } 60.1%, 100% { opacity: 0; } }
    .blink { animation: blink 1.4s steps(1, end) infinite; }

    @keyframes scroll-x {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }
    .marquee { animation: scroll-x 50s linear infinite; }

    .fade-in { opacity: 0; transform: translateY(16px); animation: fadeUp 1.2s cubic-bezier(.2,.7,.2,1) forwards; }
    .fade-in.delay-1 { animation-delay: 0.1s; }
    .fade-in.delay-2 { animation-delay: 0.3s; }
    .fade-in.delay-3 { animation-delay: 0.5s; }
    .fade-in.delay-4 { animation-delay: 0.7s; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    #cat-canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      margin: 0 auto;
      cursor: grab;
    }
    #cat-canvas:active { cursor: grabbing; }

    .toy-btn {
      transition: all .15s ease;
      background: var(--stone-50);
    }
    .toy-btn:hover { color: var(--stone-900); }
    /* High-specificity + !important so we beat Tailwind's text-stone-500 / border-stone-300 utilities */
    button.toy-btn.active {
      background-color: var(--stone-900) !important;
      color: var(--stone-50) !important;
      border-color: var(--stone-900) !important;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <!-- Top -->
  <header class="px-6 sm:px-10 pt-8 sm:pt-10">
    <div class="max-w-[1600px] mx-auto flex items-center justify-between mono text-xs tracking-[0.2em] uppercase text-stone-500">
      <span class="fade-in delay-1">Joanna Veloria</span>
      <span id="dot-easter" class="fade-in delay-1 flex items-center gap-2 cursor-pointer select-none" style="position:relative;z-index:20;">
        <span class="w-1.5 h-1.5 rounded-full bg-stone-900 blink"></span>
        In progress
      </span>
    </div>
  </header>

  <!-- Center stage — bottom-aligned so the headline sits within the cat's jump reach -->
  <main class="flex-1 flex flex-col justify-end px-6 sm:px-10 pt-16 sm:pt-24 pb-40 sm:pb-24">
    <div class="max-w-[1600px] mx-auto w-full">

      <h1 class="fade-in delay-2 display text-[14vw] lg:text-[11vw] 2xl:text-[7vw] leading-[0.88] sm:pl-[8vw]">
        Under<br/>
        <span class="text-stone-300">construction,</span><br/>
        for now.
      </h1>

      <!-- "In the meantime" line — LinkedIn + inline toy picker for the cat.
           The whole row gets a stacking context above the canvas. The fade-in
           animation applies a transform, which would otherwise trap children
           in a sub-stacking-context BELOW the z-10 canvas. -->
      <div style="position: relative; z-index: 20;" class="fade-in delay-3 mono text-xs tracking-[0.2em] uppercase text-stone-500 mt-8 sm:mt-10 flex flex-wrap items-center gap-x-3 gap-y-2 sm:pl-[8vw]">
        <span>In the meantime — visit my</span>
        <a href="https://www.linkedin.com/in/joannaveloria/" target="_blank" rel="noopener" style="position: relative; z-index: 20;" class="text-stone-900 hover:opacity-50 transition">LinkedIn ↗</a>
        <span>or play with Pixel:</span>
        <span class="flex gap-1" style="position: relative; z-index: 20;">
          <button data-toy="yarn"    style="position: relative; z-index: 20;" class="toy-btn mono text-[10px] px-2 py-1 border border-stone-300 uppercase tracking-[0.15em] text-stone-500">Yarn</button>
          <button data-toy="mouse"   style="position: relative; z-index: 20;" class="toy-btn mono text-[10px] px-2 py-1 border border-stone-300 uppercase tracking-[0.15em] text-stone-500">Mouse</button>
          <button data-toy="feather" style="position: relative; z-index: 20;" class="toy-btn mono text-[10px] px-2 py-1 border border-stone-300 uppercase tracking-[0.15em] text-stone-500">Feather</button>
          <button data-toy="fish"    style="position: relative; z-index: 20;" class="toy-btn mono text-[10px] px-2 py-1 border border-stone-300 uppercase tracking-[0.15em] text-stone-500">Fish</button>
          <button data-toy="laser"   style="position: relative; z-index: 20;" class="toy-btn mono text-[10px] px-2 py-1 border border-stone-300 uppercase tracking-[0.15em] text-stone-500">Laser</button>
          <button id="toy-clear" style="position: relative; z-index: 20; display: none; background: var(--stone-200); border-color: var(--stone-200); color: var(--stone-900);" class="mono text-[10px] border uppercase tracking-[0.15em] transition hover:opacity-70 px-3 py-2 min-w-[36px] sm:px-2 sm:py-1 sm:min-w-0"><span class="sm:hidden">×</span><span class="hidden sm:inline">× Put away</span></button>
        </span>
      </div>
    </div>
  </main>

  <!-- Cat lives on a full-viewport canvas so toys can fly anywhere -->
  <canvas id="cat-canvas" class="fixed inset-0 z-10"></canvas>

  <script>
    (function () {
      var _logged = false;
      document.getElementById('dot-easter').addEventListener('click', function (e) {
        e.stopPropagation();
        if (!_logged) {
          _logged = true;
          console.log(
            '%c\n  ✦ SECRET AREA DISCOVERED\n\n' +
            '  DESIGNER    Joanna Veloria\n' +
            '  CLASS       Main Character\n' +
            '  COMPANION   Pixel  [ status: napping ]\n' +
            '  PROGRESS    ████████░░  portfolio incoming\n\n' +
            '  you opened devtools on a portfolio site.\n' +
            '  bold move. respect.\n\n' +
            '  either you\'re curious — or you\'re hiring.\n' +
            '  hi either way.  ✦\n',
            'color:#e7e5e4;background:#1c1917;font-family:monospace;font-size:12px;line-height:2;padding:16px 24px;display:block;'
          );
        }
        document.dispatchEvent(new CustomEvent('pixel:react'));
      });
    })();
  </script>

  <script src="cat.js"></script>
  <script>
    CatGame.init({
      canvas: document.getElementById('cat-canvas'),
      scale: 2,                  // fixed pixel scale so the cat stays a sensible size
      fitToWindow: true,         // canvas spans the full viewport
      adaptiveWidth: true,
      adaptiveHeight: true,
      groundFromBottom: 12,      // cat walks 12 grid units above the viewport bottom
      showBg: false,
      showGround: false,
      toys: true,
      toyPicker: '.toy-btn',
      obstacleSelector: window.innerWidth >= 640 ? 'h1' : null, // climb on all desktop sizes, ground-only on mobile
      obstaclePadding: 1,
    });
  </script>

</body>
</html>
