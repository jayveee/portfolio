<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joanna Veloria — Coming soon</title>
  <meta name="description" content="A new portfolio by Joanna Veloria — currently in the works." />
  <meta name="robots" content="noindex" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @font-face { font-family: 'Saans'; src: url('fonts/Saans-TRIAL-Regular.otf') format('opentype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Saans'; src: url('fonts/Saans-TRIAL-Medium.otf') format('opentype'); font-weight: 500; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Saans'; src: url('fonts/Saans-TRIAL-Heavy.otf') format('opentype'); font-weight: 800; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Saans'; src: url('fonts/Saans-TRIAL-Heavy.otf') format('opentype'); font-weight: 900; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Saans Mono'; src: url('fonts/SaansMono-TRIAL-Regular.otf') format('opentype'); font-weight: 400; font-style: normal; font-display: swap; }

    :root {
      --stone-50:  #fafaf9;
      --stone-200: #e7e5e4;
      --stone-500: #78716c;
      --stone-700: #44403c;
      --stone-900: #1c1917;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Saans', ui-sans-serif, system-ui, sans-serif;
      background: var(--stone-50);
      color: var(--stone-900);
      overflow-x: hidden;
    }
    .mono { font-family: 'Saans Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
    .display { font-weight: 800; letter-spacing: -0.045em; line-height: 0.9; }
    ::selection { background: var(--stone-900); color: var(--stone-50); }

    @keyframes blink { 0%, 60% { opacity: 1; } 60.1%, 100% { opacity: 0; } }
    .blink { animation: blink 1.4s steps(1, end) infinite; }

    @keyframes scroll-x {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }
    .marquee { animation: scroll-x 50s linear infinite; }

    .fade-in { opacity: 0; transform: translateY(16px); animation: fadeUp 1.2s cubic-bezier(.2,.7,.2,1) forwards; }
    .fade-in.delay-1 { animation-delay: 0.1s; }
    .fade-in.delay-2 { animation-delay: 0.3s; }
    .fade-in.delay-3 { animation-delay: 0.5s; }
    .fade-in.delay-4 { animation-delay: 0.7s; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <!-- Top -->
  <header class="px-6 sm:px-10 pt-8 sm:pt-10">
    <div class="max-w-[1600px] mx-auto flex items-center justify-between mono text-xs tracking-[0.2em] uppercase text-stone-500">
      <span class="fade-in delay-1">Joanna Veloria</span>
      <span class="fade-in delay-1 hidden sm:inline">© 2026 — All rights reserved</span>
      <span class="fade-in delay-1 flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-stone-900 blink"></span>
        In progress
      </span>
    </div>
  </header>

  <!-- Center stage -->
  <main class="flex-1 flex flex-col justify-center px-6 sm:px-10 py-16 sm:py-24">
    <div class="max-w-[1600px] mx-auto w-full">

      <h1 class="fade-in delay-2 display text-[18vw] sm:text-[14vw] leading-[0.88]">
        Under<br/>
        <span class="text-stone-300">construction,</span><br/>
        for now.
      </h1>
    </div>
  </main>

  <!-- Footer -->
  <footer class="px-6 sm:px-10 py-10 sm:py-14 fade-in delay-4">
    <div class="max-w-[1600px] mx-auto">
      <p class="mono text-xs tracking-[0.2em] uppercase text-stone-500 mb-3">Elsewhere</p>
      <a href="https://www.linkedin.com/in/joannaveloria/" target="_blank" rel="noopener" class="text-2xl sm:text-4xl display hover:opacity-50 transition inline-block">
        LinkedIn ↗
      </a>
    </div>
  </footer>

</body>
</html>
